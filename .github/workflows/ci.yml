name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  pc-highlevel:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-pip \
            ros-humble-joy \
            ros-humble-teleop-twist-joy \
            ros-humble-tf2-ros
          pip3 install --no-cache-dir setuptools

      - name: Build high-level package
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --packages-select vmx_highlevel --symlink-install

      - name: Test high-level package
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          colcon test --packages-select vmx_highlevel --event-handlers console_direct+
          colcon test-result --verbose

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python
        run: ruff check src/ scripts/
